apiVersion: v1
data:
  prune: "#!/bin/bash\n\nset -fe\nIFS='\n'\n\nfor user in $( kubectl get user -ojson\
    \ | jq -r '.items[].metadata.name' )\ndo\n\thasvalidtoken=\"false\"\n\tfor token\
    \ in $( kubectl get oauthaccesstoken -ojson | jq -r \".items[] | select(.userName\
    \ == \\\"$user\\\") | .metadata.name\" )\n\tdo\n\t\tif [[ -n \"$token\" ]]\n\t\
    \tthen\n\t\t\tcreated=\"$( kubectl get oauthaccesstoken \"$token\" -ojson | jq\t\
    -r .metadata.creationTimestamp )\"\n\t\t\texpires=\"$( kubectl get oauthaccesstoken\
    \ \"$token\" -ojson | jq\t-r .expiresIn )\"\n\t\t\tif [[ \"$( date -d \"$created\
    \ + $expires seconds\" '+%s' )\" > \"$( date '+%s' )\" ]]\n\t\t\tthen\n\t\t\t\t\
    echo \"Token is valid.\"\n\t\t\t\thasvalidtoken=\"true\"\n\t\t\telse\n\t\t\t\t\
    echo \"Token is invalid.\"\n\t\t\tfi\n\t\tfi\n\tdone\n\n\n\n\tif $hasvalidtoken\n\
    \tthen\n\t\techo \"User $user has a valid token.\"\n\telse\n\t\tfor group in $(\
    \ kubectl get group -ojson |  jq -r \".items[] | select( .users | index(\\\"$user\\\
    \") ) | .metadata.name\" )\n\t\tdo\n\t\t\toc adm groups remove-users \"$group\"\
    \ \"$user\"\n\t\tdone\n\tfi\n\techo\ndone\n"
kind: ConfigMap
metadata:
  labels:
    name: group-prune
  name: group-prune
  namespace: openshift-config
